name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        typescript: ['5.4', '5.6', 'latest']
    name: node ${{ matrix.node }} / ts ${{ matrix.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm install --no-save typescript@${{ matrix.typescript }}
      - run: npm run build
      - run: npm test
