name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        typescript: ["5.4", "5.6", "latest"]
    name: node ${{ matrix.node }} / ts ${{ matrix.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - name: Pin TypeScript ${{ matrix.typescript }}
        run: pnpm --filter mdx-tsc add -D typescript@${{ matrix.typescript }}
      - run: pnpm run build
      - run: pnpm test
